{% extends "base.html" %}
{% block title %}Edit Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_expense.css') }}">
{% endblock %}

{% block content %}
<section class="expense-section">
  <div class="expense-container">
    <div class="expense-header">
      <h1 class="expense-title">Edit Expense</h1>
      <p class="expense-subtitle">Update your transaction</p>
    </div>
    <div class="expense-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="{{ url_for('edit_expense', id=expense_id) }}">
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input class="form-input" type="number" id="amount" name="amount"
                 step="0.01" min="0.01" required
                 value="{{ form_data.amount or '' }}">
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select class="form-input" id="category" name="category" required>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if form_data.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input class="form-input" type="date" id="date" name="date"
                 required value="{{ form_data.date or '' }}">
        </div>
        <div class="form-group">
          <label for="description">Description <em>(optional)</em></label>
          <textarea class="form-input" id="description" name="description"
                    rows="3" maxlength="200">{{ form_data.description or '' }}</textarea>
        </div>
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <button type="submit" class="btn-submit">Save Changes</button>
      </form>
      <div class="expense-cancel">
        <a href="{{ url_for('profile') }}">Cancel</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
